services:
  db:
    image: postgres:16
    container_name: wedding_postgres
    environment:
      POSTGRES_DB: wedding_invite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Tokyo
    ports:
      - "15432:5432"
    volumes:
      - wedding_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wedding_invite"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: wedding_api
    working_dir: /app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ADMIN_BASIC_USERNAME: admin
      ADMIN_BASIC_PASSWORD: change-me
      TZ: Asia/Tokyo
    depends_on:
      db:
        condition: service_healthy
    command: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

volumes:
  wedding_postgres_data:
  maven_cache: